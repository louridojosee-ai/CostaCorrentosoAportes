<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Costa Correntoso - App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 pb-20">

    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg border border-gray-200">
        <h1 class="text-2xl font-bold text-center text-slate-800 mb-6">Costa Correntoso</h1>

        <section class="mb-8 border-b pb-6">
            <div class="flex items-center mb-4">
                <div class="w-2 h-6 bg-green-500 mr-2 rounded"></div>
                <h2 class="text-lg font-bold text-slate-700 uppercase tracking-wider"># Aportes</h2>
            </div>
            <form id="formAportes" class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500">Fecha</label>
                        <input type="date" name="fecha" class="w-full border rounded p-2 text-sm" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500">Aportante</label>
                        <select name="persona" class="w-full border rounded p-2 text-sm">
                            <option value="Pablo">Pablo</option>
                            <option value="Omar">Omar</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500">Concepto</label>
                    <input type="text" name="concepto" placeholder="..." class="w-full border rounded p-2 text-sm" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500">Monto</label>
                        <input type="number" step="0.01" name="monto" placeholder="0.00" class="w-full border rounded p-2 text-sm" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500">Moneda</label>
                        <select name="moneda" onchange="toggleTC(this, 'tcAporte')" class="w-full border rounded p-2 text-sm">
                            <option value="ARS">ARS</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                </div>
                <input type="number" step="0.01" id="tcAporte" name="tc" placeholder="Tipo de Cambio" class="w-full border rounded p-2 text-sm bg-gray-50">
                <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg font-bold shadow-sm active:scale-95 transition">Cargar Aporte</button>
            </form>
        </section>

        <section>
            <div class="flex items-center mb-4">
                <div class="w-2 h-6 bg-red-500 mr-2 rounded"></div>
                <h2 class="text-lg font-bold text-slate-700 uppercase tracking-wider"># Gastos</h2>
            </div>
            <form id="formGastos" class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-500">Fecha</label>
                    <input type="date" name="fecha" class="w-full border rounded p-2 text-sm" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500">Concepto</label>
                    <input type="text" name="concepto" placeholder="..." class="w-full border rounded p-2 text-sm" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500">Monto</label>
                        <input type="number" step="0.01" name="monto" placeholder="0.00" class="w-full border rounded p-2 text-sm" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500">Moneda</label>
                        <select name="moneda" onchange="toggleTC(this, 'tcGasto')" class="w-full border rounded p-2 text-sm">
                            <option value="ARS">ARS</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                </div>
                <input type="number" step="0.01" id="tcGasto" name="tc" placeholder="Tipo de Cambio" class="w-full border rounded p-2 text-sm bg-gray-50">
                <button type="submit" class="w-full bg-red-600 text-white py-2 rounded-lg font-bold shadow-sm active:scale-95 transition">Cargar Gasto</button>
            </form>
        </section>
    </div>

    <div id="bna-info" class="fixed bottom-0 left-0 right-0 bg-slate-800 text-white p-3 text-center text-xs font-mono">
        Obteniendo TC oficial...
    </div>

    <script>
        function toggleTC(select, inputId) {
            const input = document.getElementById(inputId);
            if (select.value === 'USD') {
                input.value = "1";
                input.readOnly = true;
                input.style.backgroundColor = "#f3f4f6";
            } else {
                input.value = "";
                input.readOnly = false;
                input.style.backgroundColor = "#fff";
            }
        }

        async function fetchBNA() {
            try {
                const res = await fetch('https://api.bluelytics.com.ar/v2/latest');
                const data = await res.json();
                const venta = data.oficial.value_sell;
                document.getElementById('bna-info').innerText = `BNA VENTA: $${venta} | ${new Date().toLocaleDateString('es-AR')}`;
            } catch {
                document.getElementById('bna-info').innerText = "TC no disponible";
            }
        }
        fetchBNA();
    </script>
</body>
</html>
