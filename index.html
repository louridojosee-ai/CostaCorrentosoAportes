<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Obra | Real Estate</title>
    <script src="https://cdn.tailwindcss.org"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="p-4 pb-12">

    <div class="max-w-md mx-auto mb-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-slate-800">Costa Correntoso</h1>
        <div id="bna-info" class="text-xs font-semibold bg-blue-100 text-blue-700 px-3 py-1 rounded-full shadow-sm">
            Cargando TC...
        </div>
    </div>

    <div class="max-w-md mx-auto space-y-8">

        <section class="glass-card rounded-2xl shadow-xl overflow-hidden border-t-4 border-emerald-500">
            <div class="p-5 bg-emerald-50">
                <div class="flex items-center gap-2">
                    <i data-lucide="arrow-up-circle" class="text-emerald-600"></i>
                    <h2 class="text-lg font-bold text-emerald-800 uppercase tracking-wide">Nuevo Aporte</h2>
                </div>
            </div>
            
            <form id="formAportes" class="p-5 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Aportante</label>
                    <select name="persona" class="w-full p-3 rounded-xl border-slate-200 bg-slate-50 focus:ring-2 focus:ring-emerald-500 outline-none transition-all" required>
                        <option value="Pablo">Pablo</option>
                        <option value="Omar">Omar</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Monto</label>
                        <input type="number" step="any" name="monto" placeholder="0.00" class="w-full p-3 rounded-xl border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Moneda</label>
                        <select name="moneda" onchange="toggleTC(this, 'tcAporte')" class="w-full p-3 rounded-xl border-slate-200 bg-slate-50 outline-none">
                            <option value="USD">USD</option>
                            <option value="ARS">ARS</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">T. Cambio</label>
                        <input type="number" step="any" id="tcAporte" name="tc" value="1" readonly class="w-full p-3 rounded-xl border-slate-200 bg-slate-100 text-slate-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Fecha</label>
                        <input type="date" name="fecha" class="w-full p-3 rounded-xl border-slate-200 bg-slate-50 outline-none text-sm" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Concepto</label>
                    <input type="text" name="concepto" placeholder="Ej: Pago cuota marzo" class="w-full p-3 rounded-xl border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500" required>
                </div>

                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-200 transition-all active:scale-95">
                    GUARDAR APORTE
                </button>
            </form>
        </section>

        <section class="glass-card rounded-2xl shadow-xl overflow-hidden border-t-4 border-red-500">
            <div class="p-5 bg-red-50">
                <div class="flex items-center gap-2">
                    <i data-lucide="arrow-down-circle" class="text-red-600"></i>
                    <h2 class="text-lg font-bold text-red-800 uppercase tracking-wide">Nuevo Gasto</h2>
                </div>
            </div>

            <form id="formGastos" class="p-5 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Monto</label>
                        <input type="number" step="any" name="monto" placeholder="0.00" class="w-full p-3 rounded-xl border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-red-500" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Moneda</label>
                        <select name="moneda" onchange="toggleTC(this, 'tcGasto')" class="w-full p-3 rounded-xl border-slate-200 bg-slate-50 outline-none">
                            <option value="ARS">ARS</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">T. Cambio</label>
                        <input type="number" step="any" id="tcGasto" name="tc" placeholder="Cotización" class="w-full p-3 rounded-xl border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-red-500" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Fecha</label>
                        <input type="date" name="fecha" class="w-full p-3 rounded-xl border-slate-200 bg-slate-50 outline-none text-sm" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Concepto / Proveedor</label>
                    <input type="text" name="concepto" placeholder="Ej: Corralón El Maestro" class="w-full p-3 rounded-xl border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-red-500" required>
                </div>

                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-red-200 transition-all active:scale-95">
                    GUARDAR GASTO
                </button>
            </form>
        </section>

    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        // Autocompletar fecha de hoy
        document.querySelectorAll('input[type="date"]').forEach(input => {
            input.value = new Date().toISOString().split('T')[0];
        });

        function toggleTC(select, inputId) {
            const input = document.getElementById(inputId);
            if (select.value === 'USD') {
                input.value = "1";
                input.readOnly = true;
                input.classList.replace('bg-slate-50', 'bg-slate-100');
                input.classList.add('text-slate-400');
            } else {
                input.value = "";
                input.readOnly = false;
                input.classList.replace('bg-slate-100', 'bg-slate-50');
                input.classList.remove('text-slate-400');
            }
        }

        async function enviarDatos(e, tipo) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;
            btn.classList.add('opacity-70');

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            data.tipo = tipo;

            try {
                const res = await fetch('/api/guardar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert('✅ ' + tipo + ' registrado correctamente');
                    e.target.reset();
                    // Reset fecha hoy post-envío
                    e.target.querySelector('input[type="date"]').value = new Date().toISOString().split('T')[0];
                } else {
                    const error = await res.json();
                    alert('❌ Error: ' + error.error);
                }
            } catch (err) {
                alert('❌ Error de conexión');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-70');
            }
        }

        document.getElementById('formAportes').onsubmit = (e) => enviarDatos(e, 'APORTE');
        document.getElementById('formGastos').onsubmit = (e) => enviarDatos(e, 'GASTO');

        async function fetchBNA() {
            try {
                const res = await fetch('https://api.bluelytics.com.ar/v2/latest');
                const data = await res.json();
                document.getElementById('bna-info').innerText = `OFICIAL: $${data.oficial.value_sell}`;
            } catch {
                document.getElementById('bna-info').innerText = "TC no disponible";
            }
        }
        fetchBNA();
    </script>
</body>
</html>
