<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Costa Correntoso | Control</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .card-premium { background: white; border-radius: 24px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; overflow: hidden; }
        input, select { border: 1px solid #e2e8f0; background-color: #f8fafc; transition: all 0.2s; }
        input:focus, select:focus { border-color: #3b82f6; ring-color: #bfdbfe; background-color: white; }
        .btn-green { background-color: #10b981; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.3); }
        .btn-green:active { transform: scale(0.97); }
        .btn-red { background-color: #ef4444; box-shadow: 0 4px 6px rgba(239, 68, 68, 0.3); }
        .btn-red:active { transform: scale(0.97); }
    </style>
</head>
<body class="p-4 md:p-8 pb-16">

    <div class="max-w-md mx-auto mb-8 flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Costa Correntoso</h1>
        <div id="bna-info" class="text-sm font-bold bg-blue-50 text-blue-700 px-4 py-2 rounded-full border border-blue-100 shadow-inner">
            Cargando BNA...
        </div>
    </div>

    <div class="max-w-md mx-auto space-y-10">

        <section class="card-premium border-t-8 border-emerald-500">
            <div class="px-6 py-5 bg-emerald-50 border-b border-emerald-100 flex items-center gap-3">
                <svg class="w-7 h-7 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 11l3-3m0 0l3 3m-3-3v8m0-13a9 9 0 110 18 9 9 0 010-18z"></path></svg>
                <h2 class="text-xl font-extrabold text-emerald-900 tracking-tight">Nuevo Aporte</h2>
            </div>
            
            <form id="formAportes" class="p-6 space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1.5">Aportante</label>
                    <select name="persona" class="w-full p-3.5 rounded-xl outline-none" required>
                        <option value="Pablo">Pablo</option>
                        <option value="Omar">Omar</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1.5">Monto</label>
                        <input type="number" step="any" name="monto" placeholder="0.00" class="w-full p-3.5 rounded-xl outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1.5">Moneda</label>
                        <select name="moneda" onchange="toggleTC(this, 'tcAporte')" class="w-full p-3.5 rounded-xl outline-none">
                            <option value="USD">USD</option>
                            <option value="ARS">ARS</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1.5">T. Cambio</label>
                        <input type="number" step="any" id="tcAporte" name="tc" value="1" readonly class="w-full p-3.5 rounded-xl outline-none bg-slate-100 text-slate-500 border border-slate-200">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1.5">Fecha</label>
                        <input type="date" name="fecha" class="w-full p-3.5 rounded-xl outline-none text-slate-700" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1.5">Concepto</label>
                    <input type="text" name="concepto" placeholder="Ej: Pago cuota marzo" class="w-full p-3.5 rounded-xl outline-none" required>
                </div>

                <button type="submit" class="w-full btn-green text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 text-lg tracking-wide">
                    GUARDAR APORTE
                </button>
            </form>
        </section>

        <section class="card-premium border-t-8 border-red-500">
            <div class="px-6 py-5 bg-red-50 border-b border-red-100 flex items-center gap-3">
                <svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13l-3 3m0 0l-3-3m3 3V8m0 13a9 9 0 110 18 9 9 0 010-18z"></path></svg>
                <h2 class="text-xl font-extrabold text-red-900 tracking-tight">Nuevo Gasto</h2>
            </div>

            <form id="formGastos" class="p-6 space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1.5">Monto</label>
                        <input type="number" step="any" name="monto" placeholder="0.00" class="w-full p-3.5 rounded-xl outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1.5">Moneda</label>
                        <select name="moneda" onchange="toggleTC(this, 'tcGasto')" class="w-full p-3.5 rounded-xl outline-none">
                            <option value="ARS">ARS</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1.5">T. Cambio</label>
                        <input type="number" step="any" id="tcGasto" name="tc" placeholder="Cotización" class="w-full p-3.5 rounded-xl outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1.5">Fecha</label>
                        <input type="date" name="fecha" class="w-full p-3.5 rounded-xl outline-none text-slate-700" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1.5">Concepto / Proveedor</label>
                    <input type="text" name="concepto" placeholder="Ej: Corralón El Maestro" class="w-full p-3.5 rounded-xl outline-none" required>
                </div>

                <button type="submit" class="w-full btn-red text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 text-lg tracking-wide">
                    GUARDAR GASTO
                </button>
            </form>
        </section>

    </div>

    <script>
        // Autocompletar fecha de hoy automáticamente
        document.querySelectorAll('input[type="date"]').forEach(input => {
            input.value = new Date().toISOString().split('T')[0];
        });

        function toggleTC(select, inputId) {
            const input = document.getElementById(inputId);
            if (select.value === 'USD') {
                input.value = "1";
                input.readOnly = true;
                // Estilo visual de bloqueado pro
                input.classList.add('bg-slate-100', 'text-slate-500', 'border-slate-200');
                input.classList.remove('bg-slate-50', 'text-slate-700', 'border-slate-300');
            } else {
                input.value = "";
                input.readOnly = false;
                // Estilo visual de activo
                input.classList.remove('bg-slate-100', 'text-slate-500', 'border-slate-200');
                input.classList.add('bg-slate-50', 'text-slate-700', 'border-slate-300');
            }
        }

        async function enviarDatos(e, tipo) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;
            btn.classList.add('opacity-70');

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            data.tipo = tipo;

            try {
                const res = await fetch('/api/guardar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert('✅ ' + tipo + ' registrado correctamente');
                    e.target.reset();
                    // Reset fecha hoy post-envío
                    e.target.querySelector('input[type="date"]').value = new Date().toISOString().split('T')[0];
                } else {
                    const error = await res.json();
                    alert('❌ Error: ' + error.error);
                }
            } catch (err) {
                alert('❌ Error de conexión');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-70');
            }
        }

        document.getElementById('formAportes').onsubmit = (e) => enviarDatos(e, 'APORTE');
        document.getElementById('formGastos').onsubmit = (e) => enviarDatos(e, 'GASTO');

        async function fetchBNA() {
            try {
                const res = await fetch('https://api.bluelytics.com.ar/v2/latest');
                const data = await res.json();
                document.getElementById('bna-info').innerText = `BNA: $${data.oficial.value_sell}`;
            } catch {
                document.getElementById('bna-info').innerText = "TC no disponible";
            }
        }
        fetchBNA();
    </script>
</body>
</html>
