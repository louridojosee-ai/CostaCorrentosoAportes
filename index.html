<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aportes y Gastos Costa Correntoso</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 pb-20">

    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold text-center text-blue-800 mb-8">Aportes y Gastos Costa Correntoso</h1>

        <section class="mb-10 border-b-2 pb-8">
            <h2 class="text-xl font-semibold mb-4 text-green-700"># Aportes</h2>
            <form id="formAportes" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Fecha del aporte</label>
                    <input type="date" name="fecha" class="w-full border rounded p-2" required>
                </div>
                <div>
                    <label class="block text-sm font-medium">Aportante</label>
                    <select name="persona" class="w-full border rounded p-2">
                        <option value="Pablo">Pablo</option>
                        <option value="Omar">Omar</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium">Concepto del aporte</label>
                    <input type="text" name="concepto" placeholder="Ej: Pago materiales" class="w-full border rounded p-2" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium">Moneda</label>
                        <select name="moneda" onchange="toggleTC(this, 'tcAporte')" class="w-full border rounded p-2">
                            <option value="ARS">ARS</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium">Tipo de Cambio</label>
                        <input type="number" step="0.01" id="tcAporte" name="tc" class="w-full border rounded p-2 bg-gray-50" placeholder="0.00">
                    </div>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-2 rounded font-bold">Cargar Aporte</button>
            </form>
        </section>

        <section>
            <h2 class="text-xl font-semibold mb-4 text-red-700"># Gastos</h2>
            <form id="formGastos" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Fecha del gasto</label>
                    <input type="date" name="fecha" class="w-full border rounded p-2" required>
                </div>
                <div>
                    <label class="block text-sm font-medium">Concepto del gasto</label>
                    <input type="text" name="concepto" placeholder="Ej: Compra cemento" class="w-full border rounded p-2" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium">Moneda</label>
                        <select name="moneda" onchange="toggleTC(this, 'tcGasto')" class="w-full border rounded p-2">
                            <option value="ARS">ARS</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium">Tipo de Cambio</label>
                        <input type="number" step="0.01" id="tcGasto" name="tc" class="w-full border rounded p-2 bg-gray-50" placeholder="0.00">
                    </div>
                </div>
                <button type="submit" class="w-full bg-red-600 text-white py-2 rounded font-bold">Cargar Gasto</button>
            </form>
        </section>
    </div>

    <div id="bna-float" class="fixed bottom-0 left-0 right-0 bg-blue-900 text-white p-3 text-center text-sm shadow-lg">
        Cargando cotización BNA...
    </div>

    <script>
        // Lógica para el Tipo de Cambio
        function toggleTC(select, inputId) {
            const input = document.getElementById(inputId);
            if (select.value === 'USD') {
                input.value = "1";
                input.readOnly = true;
                input.classList.add('bg-gray-200');
            } else {
                input.value = "";
                input.readOnly = false;
                input.classList.remove('bg-gray-200');
            }
        }

        // Obtener Cotización BNA (vía API pública para evitar bloqueos)
        async function fetchBNA() {
            try {
                const response = await fetch('https://api.bluelytics.com.ar/v2/latest');
                const data = await response.json();
                const oficial = data.oficial.value_sell;
                document.getElementById('bna-float').innerText = `Cotización BNA (Venta): $${oficial} - ${new Date().toLocaleDateString()}`;
            } catch (e) {
                document.getElementById('bna-float').innerText = "No se pudo obtener la cotización actual.";
            }
        }
        fetchBNA();
    </script>
</body>
</html>
