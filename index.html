<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Costa Correntoso | Control</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .card-premium { border-radius: 24px; border: 1px solid rgba(0,0,0,0.1); overflow: hidden; transition: all 0.3s; }
        
        /* MODO OSCURO (Predeterminado) */
        body.dark { background-color: #0f172a; color: #f1f5f9; }
        .dark .card-premium { background: #1e293b; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4); border-color: #334155; }
        .dark input, .dark select { background-color: #334155; border: 1px solid #475569; color: #f1f5f9; }
        .dark .header-box { background: #1e293b; border: 1px solid #334155; }
        .dark label { color: #94a3b8; }
        .dark .bg-emerald-50 { background-color: rgba(16, 185, 129, 0.1); }
        .dark .bg-red-50 { background-color: rgba(239, 68, 68, 0.1); }

        /* MODO CLARO */
        body.light { background-color: #f1f5f9; color: #1e293b; }
        .light .card-premium { background: white; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: #e2e8f0; }
        .light input, .light select { background-color: #f8fafc; border: 1px solid #e2e8f0; color: #1e293b; }
        .light .header-box { background: white; border: 1px solid #e2e8f0; }

        .btn-green { background-color: #10b981; }
        .btn-red { background-color: #ef4444; }
        input:focus, select:focus { border-color: #3b82f6; outline: none; }
    </style>
</head>
<body class="dark p-4 md:p-8 pb-16">

    <div class="max-w-md mx-auto mb-8 flex flex-col gap-3">
        <div class="flex justify-between items-center header-box p-4 rounded-2xl shadow-sm">
            <h1 class="text-xl font-extrabold tracking-tight">Costa Correntoso</h1>
            <button id="theme-toggle" class="p-2 rounded-xl bg-slate-700 dark:bg-slate-800 transition-colors">
                <span id="theme-icon">☀️</span>
            </button>
        </div>
        <div id="bna-info" class="text-center text-xs font-bold bg-blue-900 text-blue-200 px-4 py-2 rounded-full border border-blue-800 shadow-sm">
            Cargando TC BNA venta (hoy)...
        </div>
    </div>

    <div class="max-w-md mx-auto space-y-10">

        <section class="card-premium border-t-8 border-emerald-500">
            <div class="px-6 py-5 bg-emerald-50 border-b border-emerald-100 flex items-center gap-3">
                <h2 class="text-lg font-extrabold text-emerald-500 tracking-tight">Nuevo Aporte</h2>
            </div>
            
            <form id="formAportes" class="p-6 space-y-5">
                <div>
                    <label class="block text-sm font-semibold mb-1.5">Aportante</label>
                    <select name="persona" class="w-full p-3.5 rounded-xl" required>
                        <option value="Pablo">Pablo</option>
                        <option value="Omar">Omar</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1.5">Monto</label>
                        <input type="number" step="any" name="monto" placeholder="0.00" class="w-full p-3.5 rounded-xl" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1.5">Moneda</label>
                        <select name="moneda" onchange="toggleTC(this, 'tcAporte')" class="w-full p-3.5 rounded-xl">
                            <option value="USD">USD</option>
                            <option value="ARS">ARS</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1.5">T. Cambio</label>
                        <input type="number" step="any" id="tcAporte" name="tc" value="1" readonly class="w-full p-3.5 rounded-xl opacity-50 cursor-not-allowed">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1.5">Fecha</label>
                        <input type="date" name="fecha" class="w-full p-3.5 rounded-xl" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1.5">Concepto</label>
                    <input type="text" name="concepto" placeholder="Ej: Pago cuota marzo" class="w-full p-3.5 rounded-xl" required>
                </div>

                <button type="submit" class="w-full btn-green text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 text-lg tracking-wide">
                    GUARDAR APORTE
                </button>
            </form>
        </section>

        <section class="card-premium border-t-8 border-red-500">
            <div class="px-6 py-5 bg-red-50 border-b border-red-100 flex items-center gap-3">
                <h2 class="text-lg font-extrabold text-red-500 tracking-tight">Nuevo Gasto</h2>
            </div>

            <form id="formGastos" class="p-6 space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1.5">Monto</label>
                        <input type="number" step="any" name="monto" placeholder="0.00" class="w-full p-3.5 rounded-xl" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1.5">Moneda</label>
                        <select name="moneda" onchange="toggleTC(this, 'tcGasto')" class="w-full p-3.5 rounded-xl">
                            <option value="ARS">ARS</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1.5">T. Cambio</label>
                        <input type="number" step="any" id="tcGasto" name="tc" placeholder="Cotización" class="w-full p-3.5 rounded-xl" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1.5">Fecha</label>
                        <input type="date" name="fecha" class="w-full p-3.5 rounded-xl" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1.5">Concepto / Proveedor</label>
                    <input type="text" name="concepto" placeholder="Ej: Corralón El Maestro" class="w-full p-3.5 rounded-xl" required>
                </div>

                <button type="submit" class="w-full btn-red text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 text-lg tracking-wide">
                    GUARDAR GASTO
                </button>
            </form>
        </section>
    </div>

    <script>
        const body = document.body;
        const btnToggle = document.getElementById('theme-toggle');
        const iconToggle = document.getElementById('theme-icon');
        const tcBox = document.getElementById('bna-info');

        // Función para aplicar estilos de tema
        function aplicarTema(tema) {
            if (tema === 'dark') {
                body.classList.replace('light', 'dark');
                iconToggle.innerText = '☀️';
                tcBox.classList.add('bg-blue-900', 'text-blue-200', 'border-blue-800');
                tcBox.classList.remove('bg-blue-50', 'text-blue-700', 'border-blue-100');
            } else {
                body.classList.replace('dark', 'light');
                iconToggle.innerText = '🌙';
                tcBox.classList.remove('bg-blue-900', 'text-blue-200', 'border-blue-800');
                tcBox.classList.add('bg-blue-50', 'text-blue-700', 'border-blue-100');
            }
        }

        // Lógica de inicio: Dark por defecto si no hay preferencia guardada
        const temaInicial = localStorage.getItem('theme') || 'dark';
        aplicarTema(temaInicial);

        btnToggle.onclick = () => {
            const nuevoTema = body.classList.contains('light') ? 'dark' : 'light';
            aplicarTema(nuevoTema);
            localStorage.setItem('theme', nuevoTema);
        };

        // Fecha de hoy
        document.querySelectorAll('input[type="date"]').forEach(input => {
            input.value = new Date().toISOString().split('T')[0];
        });

        function toggleTC(select, inputId) {
            const input = document.getElementById(inputId);
            if (select.value === 'USD') {
                input.value = "1";
                input.readOnly = true;
                input.style.opacity = "0.5";
            } else {
                input.value = "";
                input.readOnly = false;
                input.style.opacity = "1";
            }
        }

        async function enviarDatos(e, tipo) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            data.tipo = tipo;

            try {
                const res = await fetch('/api/guardar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert('✅ ' + tipo + ' registrado correctamente');
                    e.target.reset();
                    e.target.querySelector('input[type="date"]').value = new Date().toISOString().split('T')[0];
                } else {
                    const error = await res.json();
                    alert('❌ Error: ' + error.error);
                }
            } catch (err) {
                alert('❌ Error de conexión');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        document.getElementById('formAportes').onsubmit = (e) => enviarDatos(e, 'APORTE');
        document.getElementById('formGastos').onsubmit = (e) => enviarDatos(e, 'GASTO');

        async function fetchBNA() {
            try {
                const res = await fetch('https://api.bluelytics.com.ar/v2/latest');
                const data = await res.json();
                document.getElementById('bna-info').innerText = `TC BNA venta (hoy): $${data.oficial.value_sell}`;
            } catch {
                document.getElementById('bna-info').innerText = "TC no disponible";
            }
        }
        fetchBNA();
    </script>
</body>
</html>
